name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  # ── API — Type check + Tests ─────────────────────────────────────────────
  test-api:
    name: API — Type check + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    env:
      # Minimum env vars required for env.ts Zod validation to pass.
      # Must match the values in src/test/setup.ts.
      NODE_ENV: test
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:password@localhost:5432/freelancedoc_test
      DIRECT_URL: postgresql://postgres:password@localhost:5432/freelancedoc_test
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiJ9.test_service_key_placeholder_for_unit_tests
      JWT_SECRET: test_jwt_access_secret_min_32_chars_AAAAAA
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_min_32_chars_BBBBBB
      COOKIE_SECRET: test_cookie_signing_secret_min_32_chars_CCCCCC
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      ALLOWED_ORIGIN: http://localhost:3000
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: test@test.com
      SMTP_PASS: testpassword
      SMTP_FROM: noreply@test.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: Unit + Integration tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  # ── Web — Type check + Tests ─────────────────────────────────────────────
  test-web:
    name: Web — Type check + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ── API — Build ──────────────────────────────────────────────────────────
  build-api:
    name: API — Build
    runs-on: ubuntu-latest
    needs: [test-api]
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: test -f dist/server.js

  # ── Web — Build ──────────────────────────────────────────────────────────
  build-web:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: [test-web]

    env:
      # Next.js requires NEXT_PUBLIC_* vars at build time.
      # Use a placeholder URL in CI — the real URL is set in Vercel dashboard.
      NEXT_PUBLIC_API_URL: https://api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        working-directory: apps/web
